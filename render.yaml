services:
  - type: web
    name: stembridge-nigeria
    env: python
    buildCommand: pip install -r requirements.txt && python utils/scraper.py
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0